version: "3.8"

services:

  app:
    container_name: notes-app
    build: ./src
    ports:
      - "3000:3000"

    depends_on:
      - mongo
    volumes:
      - ./src:/app
      - /app/node_modules

  mongo:
    container_name: mongodb
    image: mongo
    restart: always
    ports:
      - "27017:27017"